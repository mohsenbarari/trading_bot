name: Merge Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  repository-governance:
    name: repository-governance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run repository breadth gate
        run: make test-gate

      - name: Run diff gate for product changes
        if: github.event_name == 'pull_request'
        run: make test-diff-gate BASE=${{ github.event.pull_request.base.sha }}

  market-postgres-gate:
    name: market-postgres-gate
    runs-on: ubuntu-latest
    needs: repository-governance
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_ci
          POSTGRES_PASSWORD: market_ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U market_ci -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-test.txt

      - name: Run mandatory market PostgreSQL proofs
        env:
          MARKET_POSTGRES_GATE_ADMIN_URL: postgresql://market_ci:market_ci@127.0.0.1:5432/postgres
          MARKET_POSTGRES_GATE_REDIS_URL: redis://127.0.0.1:6379/14
          FRONTEND_URL: http://127.0.0.1:4173
          JWT_SECRET_KEY: ci_market_postgres_gate_secret
        run: python3 scripts/run_market_postgres_gate.py --expected-sha "$(git rev-parse HEAD)"

      - name: Run real multi-worker Redis proof
        shell: bash
        env:
          MARKET_STAGE14_TEST_REDIS_URL: redis://127.0.0.1:6379/14
          DATABASE_URL: postgresql+asyncpg://market_ci:market_ci@127.0.0.1:5432/postgres
          SYNC_DATABASE_URL: postgresql+psycopg2://market_ci:market_ci@127.0.0.1:5432/postgres
          FRONTEND_URL: http://127.0.0.1:4173
          JWT_SECRET_KEY: ci_market_postgres_gate_secret
        run: |
          set -o pipefail
          python3 -m unittest -v tests.test_realtime_multiworker_redis 2>&1 | tee tmp/market-realtime-redis-gate.log
          python3 scripts/assert_no_unittest_skips.py tmp/market-realtime-redis-gate.log

      - name: Upload market datastore proof logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-gate-market-postgres-${{ github.run_number }}
          path: |
            tmp/market-postgres-gate.log
            tmp/market-realtime-redis-gate.log
          if-no-files-found: error

  observability-gate:
    name: observability-gate
    runs-on: ubuntu-latest
    needs: repository-governance
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write CI environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          SERVER_MODE=foreign
          BOT_USERNAME=ci_test_bot
          POSTGRES_DB=trading_bot_db
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=strongpassword
          DATABASE_URL=postgresql+asyncpg://admin:strongpassword@db:5432/trading_bot_db
          SYNC_DATABASE_URL=postgresql+psycopg2://admin:strongpassword@db:5432/trading_bot_db
          REDIS_URL=redis://redis:6379/0
          FRONTEND_URL=http://127.0.0.1:4173
          DEV_API_KEY=REDACTED_DEV_API_KEY
          JWT_SECRET_KEY=ci_jwt_secret_key_please_override_in_real_envs
          EOF

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-test.txt

      - name: Run Stage 9 infrastructure self-tests
        run: make stage9-infrastructure-gate

      - name: Run Stage 9 critical mutation gate
        run: make stage9-mutation-gate

      - name: Run Stage 9 isolated registration and market matrix
        run: make stage9-test-matrix

      - name: Upload Stage 9 infrastructure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage9-infrastructure-${{ github.run_number }}
          path: |
            tmp/stage9-mutation-evidence.json
            tmp/stage9-mutation-verification.json
            tmp/stage9-mutation.log
            tmp/stage9-traceability.json
            tmp/stage9-matrix/results.json
            tmp/stage9-matrix/registration/registration.log
            tmp/stage9-matrix/market/market.log
          if-no-files-found: warn

      - name: Run focused observability gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            make observability-gate ARGS="--base-ref ${{ github.event.pull_request.base.sha }} --head-ref ${{ github.sha }}"
          else
            make observability-gate
          fi

  frontend-browser-matrix:
    name: frontend-browser-matrix (${{ matrix.browser }} shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs:
      - repository-governance
      - observability-gate
      - market-postgres-gate
    timeout-minutes: 75
    env:
      CERTS_HOST_PATH: /tmp/trading-bot-ci-certs

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit
        shard:
          - 1
          - 2
          - 3
          - 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Write CI environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          ENVIRONMENT=staging
          SERVER_MODE=iran
          BOT_USERNAME=ci_test_bot
          POSTGRES_DB=trading_bot_db
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=strongpassword
          DATABASE_URL=postgresql+asyncpg://admin:strongpassword@db:5432/trading_bot_db
          SYNC_DATABASE_URL=postgresql+psycopg2://admin:strongpassword@db:5432/trading_bot_db
          REDIS_URL=redis://redis:6379/0
          FRONTEND_URL=http://127.0.0.1:4173
          DEV_API_KEY=REDACTED_DEV_API_KEY
          JWT_SECRET_KEY=ci_jwt_secret_key_please_override_in_real_envs
          EOF
          cat > frontend/.env.local <<'EOF'
          VITE_API_BASE_URL=http://127.0.0.1:8000
          VITE_STAGING_DEV_LOGIN=true
          EOF

      - name: Prepare CI host paths
        run: mkdir -p /tmp/trading-bot-ci-certs

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Bootstrap backend stack
        run: bash ./scripts/bootstrap_ci_backend.sh

      - name: Verify browser CI backend surface
        shell: bash
        run: |
          docker compose exec -T app python - <<'PY'
          from core.config import settings

          environment = (settings.environment or "").strip().lower()
          server_mode = (settings.server_mode or "").strip().lower()
          if environment != "staging":
              raise SystemExit(f"unexpected environment={environment!r}")
          if server_mode != "iran":
              raise SystemExit(f"unexpected server_mode={server_mode!r}")
          PY
          curl -fsS -o /dev/null -X POST http://127.0.0.1:8000/api/auth/dev-login \
            -H 'Content-Type: application/json'
          curl -fsS -o /dev/null -D /tmp/browser-ci-cors.headers \
            -X OPTIONS http://127.0.0.1:8000/api/auth/dev-login \
            -H 'Origin: http://127.0.0.1:4173' \
            -H 'Access-Control-Request-Method: POST'
          grep -qi '^access-control-allow-origin: http://127.0.0.1:4173' /tmp/browser-ci-cors.headers

      - name: Run Playwright browser gate
        working-directory: frontend
        env:
          CI: 'true'
          PLAYWRIGHT_HTML_OPEN: never
        shell: bash
        run: |
          case "${{ matrix.browser }}" in
            chromium)
              npm run test:e2e -- --shard=${{ matrix.shard }}/4
              ;;
            firefox)
              npm run test:e2e:firefox -- --shard=${{ matrix.shard }}/4
              ;;
            webkit)
              npm run test:e2e:webkit -- --shard=${{ matrix.shard }}/4
              ;;
            *)
              echo "Unsupported browser: ${{ matrix.browser }}" >&2
              exit 1
              ;;
          esac

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-gate-playwright-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Print backend logs on failure
        if: failure()
        run: docker compose logs --no-color app migration db redis

      - name: Tear down backend stack
        if: always()
        run: docker compose down --volumes --remove-orphans
