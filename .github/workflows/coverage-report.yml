name: Coverage Report

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: Optional git ref to run the coverage report for
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: coverage-report-${{ github.event.pull_request.number || inputs.git_ref || github.sha }}
  cancel-in-progress: true

jobs:
  repository-coverage:
    name: repository-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Write CI environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          SERVER_MODE=foreign
          BOT_USERNAME=ci_test_bot
          POSTGRES_DB=trading_bot_db
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=strongpassword
          DATABASE_URL=postgresql+asyncpg://admin:strongpassword@db:5432/trading_bot_db
          SYNC_DATABASE_URL=postgresql+psycopg2://admin:strongpassword@db:5432/trading_bot_db
          REDIS_URL=redis://redis:6379/0
          FRONTEND_URL=http://127.0.0.1:4173
          DEV_API_KEY=REDACTED_DEV_API_KEY
          JWT_SECRET_KEY=ci_jwt_secret_key_please_override_in_real_envs
          EOF

      - name: Install backend coverage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 file make nginx
          python3 -m pip install --upgrade pip
          python3 -m pip install coverage
          python3 -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend coverage suite
        id: backend_coverage
        continue-on-error: true
        shell: bash
        run: |
          set +e
          status=0
          mkdir -p tmp
          python3 -m coverage erase
          python3 -m coverage run --branch -m unittest discover -s tests -p 'test_*.py' 2>&1 | tee tmp/backend-coverage.log
          command_status=${PIPESTATUS[0]}
          if [[ "$command_status" -ne 0 ]]; then
            status=$command_status
          fi
          python3 -m coverage json -o tmp/backend-coverage.json || status=$?
          python3 -m coverage xml -o tmp/backend-coverage.xml || status=$?
          python3 -m coverage html -d tmp/backend-coverage-html || status=$?
          printf '%s\n' "$status" > tmp/backend-coverage.exitcode
          exit "$status"

      - name: Run frontend unit coverage suite
        id: frontend_coverage
        continue-on-error: true
        working-directory: frontend
        env:
          CI: 'true'
        shell: bash
        run: |
          set +e
          status=0
          npm run test:unit:coverage 2>&1 | tee ../tmp/frontend-unit-coverage.log
          command_status=${PIPESTATUS[0]}
          if [[ "$command_status" -ne 0 ]]; then
            status=$command_status
          fi
          printf '%s\n' "$status" > ../tmp/frontend-unit-coverage.exitcode
          exit "$status"

      - name: Build repository coverage summary
        if: always()
        shell: bash
        run: |
          backend_suite_exit_code="$(cat tmp/backend-coverage.exitcode 2>/dev/null || echo 1)"
          frontend_suite_exit_code="$(cat tmp/frontend-unit-coverage.exitcode 2>/dev/null || echo 1)"
          python3 ./scripts/build_repo_coverage_summary.py \
            --backend-json tmp/backend-coverage.json \
            --frontend-summary frontend/coverage/coverage-summary.json \
            --markdown-out tmp/repo-coverage-summary.md \
            --json-out tmp/repo-coverage-summary.json
          cat tmp/repo-coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          {
            echo
            echo '## GitHub Navigation'
            echo
            echo '- Open **Actions** in GitHub, then open the latest **Coverage Report** run.'
            echo '- Read the percentages directly in the run **Summary** tab.'
            echo '- Download **repository-coverage-${{ github.run_number }}** from the **Artifacts** section for the backend/frontend HTML reports and raw JSON/XML outputs.'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$backend_suite_exit_code" != '0' && -f tmp/backend-coverage.log ]]; then
            {
              echo
              echo '## Backend Coverage Failure Tail'
              echo
              echo '```text'
              tail -n 200 tmp/backend-coverage.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$frontend_suite_exit_code" != '0' && -f tmp/frontend-unit-coverage.log ]]; then
            {
              echo
              echo '## Frontend Coverage Failure Tail'
              echo
              echo '```text'
              tail -n 200 tmp/frontend-unit-coverage.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-coverage-${{ github.run_number }}
          path: |
            tmp/backend-coverage-html
            tmp/backend-coverage.exitcode
            tmp/backend-coverage.log
            tmp/backend-coverage.json
            tmp/backend-coverage.xml
            frontend/coverage
            tmp/frontend-unit-coverage.exitcode
            tmp/frontend-unit-coverage.log
            tmp/repo-coverage-summary.md
            tmp/repo-coverage-summary.json
          if-no-files-found: warn

      - name: Fail coverage job if a covered suite failed
        if: always()
        shell: bash
        run: |
          backend_suite_exit_code="$(cat tmp/backend-coverage.exitcode 2>/dev/null || echo 1)"
          frontend_suite_exit_code="$(cat tmp/frontend-unit-coverage.exitcode 2>/dev/null || echo 1)"
          echo "Backend coverage exit code: $backend_suite_exit_code"
          echo "Frontend coverage exit code: $frontend_suite_exit_code"
          if [[ "$backend_suite_exit_code" == '0' && "$frontend_suite_exit_code" == '0' ]]; then
            exit 0
          fi
          echo 'At least one covered suite failed.' >&2
          exit 1
