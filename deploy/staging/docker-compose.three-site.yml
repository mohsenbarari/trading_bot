name: trading-bot-three-site-staging

# Functional four-role staging topology. Every mutable store is independent.
# Shared-host-safe campaigns may reuse a production host identity, but every
# container remains in the staging cgroup and has an explicit resource ceiling.
# Host-destructive campaigns still require four dedicated temporary hosts.

x-app: &app
  image: trading_bot_three_site_staging:${STAGING_RELEASE_SHA:?exact release SHA required}
  build:
    context: ${STAGING_SOURCE_ROOT:?exact absolute source root required}
    dockerfile: Dockerfile
    args:
      FRONTEND_DIST_DIR: ${STAGING_FRONTEND_DOCKER_DIST_DIR:-mini_app_dist_staging}
      RELEASE_SHA: ${STAGING_RELEASE_SHA:?exact release SHA required}
  restart: unless-stopped
  cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
  cpus: ${STAGING_APP_CPU_LIMIT:-1.0}
  mem_limit: ${STAGING_APP_MEMORY_LIMIT:-768m}
  pids_limit: ${STAGING_APP_PIDS_LIMIT:-256}
  volumes:
    - ${STAGING_DR_CA_CERT:?required}:/run/staging-dr-ca/ca.crt:ro
  logging: &logging
    driver: json-file
    options: {max-size: "20m", max-file: "5"}

x-three-site: &three_site
  TZ: UTC
  ENVIRONMENT: staging
  TRUSTED_PROXY_CIDRS: ${STAGING_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128,172.16.0.0/12}
  TOPOLOGY_SCHEMA_VERSION: three-site-dr-v1
  THREE_SITE_DR_ENABLED: "true"
  DR_EVENT_PROTOCOL_ENABLED: "true"
  DR_EVENT_PROTOCOL_STRICT: "true"
  DR_SYNC_VERIFY_TLS: "true"
  DR_SYNC_CA_BUNDLE: /run/staging-dr-ca/ca.crt
  RELEASE_SHA: ${STAGING_RELEASE_SHA:?exact release SHA required}

x-postgres: &postgres
  image: trading_bot_postgres_boottime:15-${STAGING_RELEASE_SHA:?exact release SHA required}
  build:
    context: ${STAGING_SOURCE_ROOT:?exact absolute source root required}
    dockerfile: deploy/postgres-boottime/Dockerfile
    args:
      RELEASE_SHA: ${STAGING_RELEASE_SHA:?exact release SHA required}
  restart: unless-stopped
  cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
  cpus: ${STAGING_POSTGRES_CPU_LIMIT:-2.0}
  mem_limit: ${STAGING_POSTGRES_MEMORY_LIMIT:-2g}
  pids_limit: ${STAGING_POSTGRES_PIDS_LIMIT:-512}
  command: [postgres, -c, timezone=UTC, -c, log_timezone=UTC]
  logging: *logging
  healthcheck:
    test: [CMD-SHELL, "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
    interval: 5s
    timeout: 3s
    retries: 30

x-redis: &redis
  image: redis:7-alpine
  restart: unless-stopped
  cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
  cpus: ${STAGING_REDIS_CPU_LIMIT:-0.5}
  mem_limit: ${STAGING_REDIS_MEMORY_LIMIT:-512m}
  pids_limit: ${STAGING_REDIS_PIDS_LIMIT:-128}
  command: [redis-server, --appendonly, "yes", --appendfsync, everysec, --maxmemory-policy, noeviction]
  logging: *logging

x-webapp-fi-owner-env: &webapp_fi_owner_env
  <<: *three_site
  SERVER_MODE: iran
  LOGICAL_AUTHORITY: webapp
  PHYSICAL_SITE: webapp_fi
  DATABASE_URL: postgresql+asyncpg://${WEBAPP_FI_POSTGRES_USER}:${WEBAPP_FI_POSTGRES_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  SYNC_DATABASE_URL: postgresql://${WEBAPP_FI_POSTGRES_USER}:${WEBAPP_FI_POSTGRES_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  POSTGRES_USER: ${WEBAPP_FI_POSTGRES_USER}
  POSTGRES_PASSWORD: ${WEBAPP_FI_POSTGRES_PASSWORD}
  POSTGRES_DB: ${WEBAPP_FI_POSTGRES_DB}
  FRONTEND_URL: ${FRONTEND_URL:?required}
  PUBLIC_WEBAPP_URL: ${PUBLIC_WEBAPP_URL:?required}
  # Required only because the shared Settings model is imported by migration
  # tools.  This literal is not a credential and cannot validate API tokens.
  JWT_SECRET_KEY: migration-role-does-not-serve-jwt-webapp-fi
  REDIS_URL: redis://webapp_fi_redis:6379/0
  REDIS_HOST: webapp_fi_redis

x-webapp-fi-app-env: &webapp_fi_app_env
  <<: *webapp_fi_owner_env
  DATABASE_URL: postgresql+asyncpg://webapp_fi_app:${WEBAPP_FI_APP_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  SYNC_DATABASE_URL: postgresql://webapp_fi_app:${WEBAPP_FI_APP_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  POSTGRES_USER: webapp_fi_app
  POSTGRES_PASSWORD: ${WEBAPP_FI_APP_DB_PASSWORD}
  JWT_SECRET_KEY: runtime-role-does-not-serve-jwt-webapp-fi
  WRITER_WITNESS_REQUIRED: "true"

x-webapp-fi-env: &webapp_fi_env
  <<: *webapp_fi_app_env
  WRITER_WITNESS_PUBLIC_KEY: ${WRITER_WITNESS_PUBLIC_KEY:?required}
  WRITER_WITNESS_AUTO_RENEW_ENABLED: "false"

x-webapp-fi-control-env: &webapp_fi_control_env
  <<: *webapp_fi_owner_env
  DATABASE_URL: postgresql+asyncpg://webapp_fi_control:${WEBAPP_FI_CONTROL_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  SYNC_DATABASE_URL: postgresql://webapp_fi_control:${WEBAPP_FI_CONTROL_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  DR_CONTROL_DATABASE_URL: postgresql+asyncpg://webapp_fi_control:${WEBAPP_FI_CONTROL_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  POSTGRES_USER: webapp_fi_control
  POSTGRES_PASSWORD: ${WEBAPP_FI_CONTROL_DB_PASSWORD}
  JWT_SECRET_KEY: control-agent-does-not-serve-jwt-webapp-fi
  WRITER_WITNESS_REQUIRED: "true"
  WRITER_WITNESS_INTERNAL_URL: ${STAGING_WITNESS_URL:?required}
  WRITER_WITNESS_CA_BUNDLE: /run/staging-dr-ca/ca.crt
  WRITER_WITNESS_CLIENT_KEY_ID: ${WEBAPP_FI_WITNESS_KEY_ID:?required}
  WRITER_WITNESS_CLIENT_SECRET: ${WEBAPP_FI_WITNESS_SECRET:?required}
  WRITER_WITNESS_PUBLIC_KEY: ${WRITER_WITNESS_PUBLIC_KEY:?required}
  WRITER_WITNESS_AUTO_RENEW_ENABLED: "true"

x-webapp-fi-projection-env: &webapp_fi_projection_env
  <<: *webapp_fi_owner_env
  DATABASE_URL: postgresql+asyncpg://webapp_fi_projection:${WEBAPP_FI_PROJECTION_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  SYNC_DATABASE_URL: postgresql://webapp_fi_projection:${WEBAPP_FI_PROJECTION_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  DR_PROJECTION_DATABASE_URL: postgresql+asyncpg://webapp_fi_projection:${WEBAPP_FI_PROJECTION_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  POSTGRES_USER: webapp_fi_projection
  POSTGRES_PASSWORD: ${WEBAPP_FI_PROJECTION_DB_PASSWORD}
  JWT_SECRET_KEY: projection-role-does-not-serve-jwt-webapp-fi

x-webapp-fi-observer-env: &webapp_fi_observer_env
  <<: *webapp_fi_owner_env
  DATABASE_URL: postgresql+asyncpg://webapp_fi_observer:${WEBAPP_FI_OBSERVER_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  SYNC_DATABASE_URL: postgresql://webapp_fi_observer:${WEBAPP_FI_OBSERVER_DB_PASSWORD}@webapp_fi_db/${WEBAPP_FI_POSTGRES_DB}
  POSTGRES_USER: webapp_fi_observer
