      DR_BLOB_ENCRYPTION_KEYRING_FILE: /run/secrets/dr-blob-keyring.json
    volumes:
      - ${STAGING_DR_CA_CERT:?required}:/run/staging-dr-ca/ca.crt:ro
      - webapp_ir_uploads:/app/uploads
      - ${STAGING_DR_BLOB_CREDENTIALS_FILE:?required}:/run/secrets/dr-blob-s3.json:ro
      - ${STAGING_DR_BLOB_ENCRYPTION_KEYRING_FILE:?required}:/run/secrets/dr-blob-keyring.json:ro
    depends_on: {webapp_ir_api: {condition: service_started}}
    extra_hosts:
      - "webapp-fi-dr.staging.internal:${WEBAPP_IR_PEER_WEBAPP_FI_IP:?required}"
    networks: [webapp_ir, webapp_ir_egress]

  webapp_ir_dr_receiver:
    profiles: [webapp-ir]
    <<: *app
    command: [uvicorn, dr_receiver_app:app, --host, 0.0.0.0, --port, "8000", --workers, "1"]
    environment:
      <<: *webapp_ir_projection_env
      TRADING_BOT_SERVICE: dr_receiver
      DATABASE_URL: postgresql+asyncpg://webapp_ir_receiver:${WEBAPP_IR_RECEIVER_DB_PASSWORD}@webapp_ir_db/${WEBAPP_IR_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://webapp_ir_receiver:${WEBAPP_IR_RECEIVER_DB_PASSWORD}@webapp_ir_db/${WEBAPP_IR_POSTGRES_DB}
      DR_PROJECTION_DATABASE_URL: postgresql+asyncpg://webapp_ir_receiver:${WEBAPP_IR_RECEIVER_DB_PASSWORD}@webapp_ir_db/${WEBAPP_IR_POSTGRES_DB}
      POSTGRES_USER: webapp_ir_receiver
      POSTGRES_PASSWORD: ${WEBAPP_IR_RECEIVER_DB_PASSWORD}
      DR_SYNC_PAIRWISE_KEYS_JSON: ${WEBAPP_IR_DR_PAIRWISE_KEYS_JSON:?required}
      ORIGIN_EXPECTED_MIGRATION_REVISION: ${ORIGIN_EXPECTED_MIGRATION_REVISION:?required}
    depends_on: {webapp_ir_db_fencing: {condition: service_completed_successfully}}
    networks: [webapp_ir]
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 5s
      timeout: 4s
      retries: 20

  witness_db:
    profiles: [witness]
    <<: *postgres
    environment:
      TZ: UTC
      POSTGRES_USER: ${WITNESS_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${WITNESS_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${WITNESS_POSTGRES_DB:?required}
    volumes: [witness_postgres:/var/lib/postgresql/data]
    networks: [witness]

  witness_api:
    profiles: [witness]
    <<: *app
    command: [uvicorn, writer_witness_app:app, --host, 0.0.0.0, --port, "8000", --workers, "1"]
    environment:
      TZ: UTC
      ENVIRONMENT: staging
      LOGICAL_AUTHORITY: webapp
      PHYSICAL_SITE: webapp_ir
      WRITER_WITNESS_DATABASE_URL: postgresql+asyncpg://${WITNESS_RUNTIME_DB_USER:-writer_witness_runtime}:${WITNESS_RUNTIME_DB_PASSWORD:?required}@witness_db/${WITNESS_POSTGRES_DB}
      WRITER_WITNESS_PRODUCT_DATABASE_USER: webapp_ir_app
      WRITER_WITNESS_RELEASE_SHA: ${STAGING_RELEASE_SHA}
      WRITER_WITNESS_SERVICE_ENABLED: "true"
      WRITER_WITNESS_PRIVATE_KEY_FILE: /run/witness-signing/private.key
      WRITER_WITNESS_PUBLIC_KEY: ${WRITER_WITNESS_PUBLIC_KEY:?required}
      WRITER_WITNESS_AUTHORITATIVE_SITE: webapp_ir
      WRITER_WITNESS_SERVICE_WEBAPP_FI_KEY_ID: ${WEBAPP_FI_WITNESS_KEY_ID:?required}
      WRITER_WITNESS_SERVICE_WEBAPP_FI_SECRET: ${WEBAPP_FI_WITNESS_SECRET:?required}
      WRITER_WITNESS_SERVICE_WEBAPP_IR_KEY_ID: ${WEBAPP_IR_WITNESS_KEY_ID:?required}
      WRITER_WITNESS_SERVICE_WEBAPP_IR_SECRET: ${WEBAPP_IR_WITNESS_SECRET:?required}
    volumes:
      - ${STAGING_DR_CA_CERT:?required}:/run/staging-dr-ca/ca.crt:ro
      - ${STAGING_WITNESS_SIGNING_KEY:?required}:/run/witness-signing/private.key:ro
      - witness_audit:/app/audit_trail
    ports: ["127.0.0.1:8214:8000"]
    depends_on: {witness_migration: {condition: service_completed_successfully}}
    networks: [witness]

  witness_role_bootstrap:
    profiles: [witness]
    <<: *app
    restart: "no"
    command: [python, scripts/provision_staging_witness_database.py, bootstrap]
    environment:
      WRITER_WITNESS_BOOTSTRAP_DATABASE_URL: postgresql://${WITNESS_POSTGRES_USER}:${WITNESS_POSTGRES_PASSWORD}@witness_db/${WITNESS_POSTGRES_DB}
      WRITER_WITNESS_MIGRATOR_DB_USER: ${WITNESS_MIGRATOR_DB_USER:-writer_witness_migrator}
      WRITER_WITNESS_MIGRATOR_DB_PASSWORD: ${WITNESS_MIGRATOR_DB_PASSWORD:?required}
      WRITER_WITNESS_RUNTIME_DB_USER: ${WITNESS_RUNTIME_DB_USER:-writer_witness_runtime}
      WRITER_WITNESS_RUNTIME_DB_PASSWORD: ${WITNESS_RUNTIME_DB_PASSWORD:?required}
    depends_on: {witness_db: {condition: service_healthy}}
    networks: [witness]

  witness_migration:
    profiles: [witness]
    <<: *app
    restart: "no"
    command: [python, scripts/provision_staging_witness_database.py, migrate]
    environment:
      WRITER_WITNESS_MIGRATOR_DATABASE_URL: postgresql://${WITNESS_MIGRATOR_DB_USER:-writer_witness_migrator}:${WITNESS_MIGRATOR_DB_PASSWORD:?required}@witness_db/${WITNESS_POSTGRES_DB}
      WRITER_WITNESS_MIGRATOR_DB_USER: ${WITNESS_MIGRATOR_DB_USER:-writer_witness_migrator}
      WRITER_WITNESS_RUNTIME_DB_USER: ${WITNESS_RUNTIME_DB_USER:-writer_witness_runtime}
    depends_on: {witness_role_bootstrap: {condition: service_completed_successfully}}
    networks: [witness]

  bot_fi_dr_tls:
    profiles: [bot-fi]
    image: nginx:1.27-alpine
    cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
    cpus: ${STAGING_NGINX_CPU_LIMIT:-0.25}
    mem_limit: ${STAGING_NGINX_MEMORY_LIMIT:-128m}
    pids_limit: ${STAGING_NGINX_PIDS_LIMIT:-64}
    restart: unless-stopped
    volumes:
      - ${STAGING_SOURCE_ROOT:?required}/deploy/staging/nginx/bot-fi-dr.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STAGING_BOT_FI_TLS_CERT:?required}:/run/tls/server.crt:ro
      - ${STAGING_BOT_FI_TLS_KEY:?required}:/run/tls/server.key:ro
    depends_on: {bot_fi_dr_receiver: {condition: service_healthy}}
    ports: ["${BOT_FI_DR_BIND_ADDRESS:?required}:8443:443"]
    networks: [bot_fi, bot_fi_ingress]
    logging: *logging

  webapp_fi_dr_tls:
    profiles: [webapp-fi]
    image: nginx:1.27-alpine
    cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
    cpus: ${STAGING_NGINX_CPU_LIMIT:-0.25}
    mem_limit: ${STAGING_NGINX_MEMORY_LIMIT:-128m}
    pids_limit: ${STAGING_NGINX_PIDS_LIMIT:-64}
    restart: unless-stopped
    volumes:
      - ${STAGING_SOURCE_ROOT:?required}/deploy/staging/nginx/webapp-fi-dr.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STAGING_WEBAPP_FI_TLS_CERT:?required}:/run/tls/server.crt:ro
      - ${STAGING_WEBAPP_FI_TLS_KEY:?required}:/run/tls/server.key:ro
    depends_on: {webapp_fi_dr_receiver: {condition: service_healthy}}
    ports: ["${WEBAPP_FI_DR_BIND_ADDRESS:?required}:8443:443"]
    networks: [webapp_fi, webapp_fi_ingress]
    logging: *logging

  webapp_ir_dr_tls:
    profiles: [webapp-ir]
    image: nginx:1.27-alpine
    cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
    cpus: ${STAGING_NGINX_CPU_LIMIT:-0.25}
    mem_limit: ${STAGING_NGINX_MEMORY_LIMIT:-128m}
    pids_limit: ${STAGING_NGINX_PIDS_LIMIT:-64}
    restart: unless-stopped
    volumes:
      - ${STAGING_SOURCE_ROOT:?required}/deploy/staging/nginx/webapp-ir-dr.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STAGING_WEBAPP_IR_TLS_CERT:?required}:/run/tls/server.crt:ro
      - ${STAGING_WEBAPP_IR_TLS_KEY:?required}:/run/tls/server.key:ro
    depends_on: {webapp_ir_dr_receiver: {condition: service_healthy}}
    ports: ["${WEBAPP_IR_DR_BIND_ADDRESS:?required}:8443:443"]
    networks: [webapp_ir, webapp_ir_ingress]
    logging: *logging

  witness_dr_tls:
    profiles: [witness]
    image: nginx:1.27-alpine
    cgroup_parent: ${STAGING_CGROUP_PARENT:?dedicated staging cgroup required}
    cpus: ${STAGING_NGINX_CPU_LIMIT:-0.25}
    mem_limit: ${STAGING_NGINX_MEMORY_LIMIT:-128m}
    pids_limit: ${STAGING_NGINX_PIDS_LIMIT:-64}
    restart: unless-stopped
    volumes:
      - ${STAGING_SOURCE_ROOT:?required}/deploy/staging/nginx/witness-dr.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STAGING_WITNESS_TLS_CERT:?required}:/run/tls/server.crt:ro
      - ${STAGING_WITNESS_TLS_KEY:?required}:/run/tls/server.key:ro
    depends_on: {witness_api: {condition: service_started}}
    ports: ["${WITNESS_DR_BIND_ADDRESS:?required}:8444:443"]
    networks: [witness, witness_ingress]
    logging: *logging

networks:
  bot_fi: {internal: true}
  webapp_fi: {internal: true}
  webapp_ir: {internal: true}
  witness: {internal: true}
  # These host-level bridge networks are intentionally non-internal. Host
  # firewall rules must restrict their published/egress paths to the exact
  # signed inventory peers before services are started.
  bot_fi_dr_egress: {}
  webapp_fi_dr_egress: {}
  webapp_ir_dr_egress: {}
  writer_witness_egress: {}
  bot_fi_ingress: {}
  webapp_fi_ingress: {}
  webapp_ir_ingress: {}
  witness_ingress: {}
  bot_fi_egress: {}
  webapp_fi_egress: {}
  webapp_ir_egress: {}

volumes:
  bot_fi_postgres:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/bot_fi/postgres"}
  bot_fi_redis:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/bot_fi/redis"}
  bot_fi_uploads:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/bot_fi/uploads"}
  bot_fi_audit:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/bot_fi/audit"}
  webapp_fi_postgres:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_fi/postgres"}
  webapp_fi_redis:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_fi/redis"}
  webapp_fi_uploads:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_fi/uploads"}
  webapp_fi_audit:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_fi/audit"}
  webapp_ir_postgres:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_ir/postgres"}
  webapp_ir_redis:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_ir/redis"}
  webapp_ir_uploads:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_ir/uploads"}
  webapp_ir_audit:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/webapp_ir/audit"}
  witness_postgres:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/witness/postgres"}
  witness_audit:
    driver: local
    driver_opts: {type: none, o: bind, device: "${STAGING_DATA_ROOT:?dedicated staging data mount required}/witness/audit"}
