services:
  bot_fi_db:
    profiles: [bot-fi]
    <<: *postgres
    environment:
      TZ: UTC
      POSTGRES_USER: ${BOT_FI_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${BOT_FI_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${BOT_FI_POSTGRES_DB:?required}
    volumes: [bot_fi_postgres:/var/lib/postgresql/data]
    networks: [bot_fi]

  bot_fi_redis:
    profiles: [bot-fi]
    <<: *redis
    volumes: [bot_fi_redis:/data]
    networks: [bot_fi]

  bot_fi_migration:
    profiles: [bot-fi]
    <<: *app
    restart: "no"
    command: [python, manage.py]
    environment: &bot_env
      <<: *three_site
      SERVER_MODE: foreign
      LOGICAL_AUTHORITY: foreign
      PHYSICAL_SITE: bot_fi
      DATABASE_URL: postgresql+asyncpg://${BOT_FI_POSTGRES_USER}:${BOT_FI_POSTGRES_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://${BOT_FI_POSTGRES_USER}:${BOT_FI_POSTGRES_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      POSTGRES_USER: ${BOT_FI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BOT_FI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BOT_FI_POSTGRES_DB}
      FRONTEND_URL: ${FRONTEND_URL:?required}
      JWT_SECRET_KEY: migration-role-does-not-serve-jwt-bot-fi
      REDIS_URL: redis://bot_fi_redis:6379/0
      REDIS_HOST: bot_fi_redis
    depends_on: {bot_fi_db: {condition: service_healthy}}
    networks: [bot_fi]

  bot_fi_api:
    profiles: [bot-fi]
    <<: *app
    command: [uvicorn, main:app, --host, 0.0.0.0, --port, "8000", --workers, "1"]
    environment:
      <<: *bot_env
      TRADING_BOT_SERVICE: api
      TELEGRAM_DELIVERY_PRODUCER_MODE: ${TELEGRAM_DELIVERY_PRODUCER_MODE:?required}
      TELEGRAM_DELIVERY_EXPECTED_EXECUTION_OWNER: ${TELEGRAM_DELIVERY_EXPECTED_EXECUTION_OWNER:?required}
      DATABASE_URL: postgresql+asyncpg://bot_fi_app:${BOT_FI_APP_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://bot_fi_app:${BOT_FI_APP_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      POSTGRES_USER: bot_fi_app
      POSTGRES_PASSWORD: ${BOT_FI_APP_DB_PASSWORD}
      JWT_SECRET_KEY: ${BOT_FI_JWT_SECRET_KEY:?required}
    volumes:
      - ${STAGING_DR_CA_CERT:?required}:/run/staging-dr-ca/ca.crt:ro
      - bot_fi_uploads:/app/uploads
      - bot_fi_audit:/app/audit_trail
    ports: ["127.0.0.1:8211:8000"]
    depends_on:
      bot_fi_db_roles: {condition: service_completed_successfully}
      bot_fi_redis: {condition: service_started}
    networks: [bot_fi, bot_fi_egress]

  bot_fi_bot:
    profiles: [bot-fi]
    <<: *app
    command: [python, run_bot.py]
    environment:
      <<: *bot_env
      TRADING_BOT_SERVICE: bot
      BOT_TOKEN: ${BOT_TOKEN:?required}
      BOT_USERNAME: ${BOT_USERNAME:?required}
      CHANNEL_ID: ${CHANNEL_ID:?required}
      CHANNEL_INVITE_LINK: ${CHANNEL_INVITE_LINK:?required}
      TELEGRAM_DELIVERY_PRODUCER_MODE: ${TELEGRAM_DELIVERY_PRODUCER_MODE:?required}
      TELEGRAM_DELIVERY_EXPECTED_EXECUTION_OWNER: ${TELEGRAM_DELIVERY_EXPECTED_EXECUTION_OWNER:?required}
      TELEGRAM_DELIVERY_EXECUTION_OWNER: ${TELEGRAM_DELIVERY_EXECUTION_OWNER:?required}
      TELEGRAM_DELIVERY_QUEUE_WORKER_ENABLED: ${TELEGRAM_DELIVERY_QUEUE_WORKER_ENABLED:?required}
      TELEGRAM_DELIVERY_QUEUE_CUTOVER_READY: ${TELEGRAM_DELIVERY_QUEUE_CUTOVER_READY:?required}
      TELEGRAM_DELIVERY_QUEUE_CHANNEL_EDITOR_ENABLED: ${TELEGRAM_DELIVERY_QUEUE_CHANNEL_EDITOR_ENABLED:?required}
      TELEGRAM_DELIVERY_QUEUE_CHANNEL_EDITOR_BOT_TOKEN: ${TELEGRAM_DELIVERY_QUEUE_CHANNEL_EDITOR_BOT_TOKEN:-}
      TELEGRAM_DELIVERY_QUEUE_EXPECTED_PRIMARY_BOT_ID: ${TELEGRAM_DELIVERY_QUEUE_EXPECTED_PRIMARY_BOT_ID:?required}
      TELEGRAM_DELIVERY_QUEUE_EXPECTED_CHANNEL_EDITOR_BOT_ID: ${TELEGRAM_DELIVERY_QUEUE_EXPECTED_CHANNEL_EDITOR_BOT_ID:-0}
      TELEGRAM_DELIVERY_QUEUE_EXPECTED_CHANNEL_ID: ${TELEGRAM_DELIVERY_QUEUE_EXPECTED_CHANNEL_ID:?required}
      DATABASE_URL: postgresql+asyncpg://bot_fi_app:${BOT_FI_APP_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://bot_fi_app:${BOT_FI_APP_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      POSTGRES_USER: bot_fi_app
      POSTGRES_PASSWORD: ${BOT_FI_APP_DB_PASSWORD}
      JWT_SECRET_KEY: bot-runtime-does-not-serve-jwt
    volumes:
      - ${STAGING_DR_CA_CERT:?required}:/run/staging-dr-ca/ca.crt:ro
      - bot_fi_audit:/app/audit_trail
    depends_on: {bot_fi_api: {condition: service_started}}
    networks: [bot_fi, bot_fi_egress]

  bot_fi_dr_delivery:
    profiles: [bot-fi]
    <<: *app
    command: [python, -m, core.dr_delivery_worker]
    environment:
      <<: *bot_env
      TRADING_BOT_SERVICE: dr_delivery_worker
      DR_SYNC_PEER_URLS_JSON: ${BOT_FI_DR_PEERS_JSON:?required}
      DR_SYNC_PAIRWISE_KEYS_JSON: ${BOT_FI_DR_PAIRWISE_KEYS_JSON:?required}
      DATABASE_URL: postgresql+asyncpg://bot_fi_delivery:${BOT_FI_DELIVERY_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://bot_fi_delivery:${BOT_FI_DELIVERY_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      DR_PROJECTION_DATABASE_URL: postgresql+asyncpg://bot_fi_delivery:${BOT_FI_DELIVERY_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      POSTGRES_USER: bot_fi_delivery
      POSTGRES_PASSWORD: ${BOT_FI_DELIVERY_DB_PASSWORD}
    depends_on: {bot_fi_dr_receiver: {condition: service_healthy}}
    extra_hosts:
      - "webapp-fi-dr.staging.internal:${BOT_FI_PEER_WEBAPP_FI_IP:?required}"
    # Cross-host transport uses a dedicated, host-firewall-restricted egress
    # network. Docker "internal" networks do not span physical hosts.
    networks: [bot_fi, bot_fi_dr_egress]

  bot_fi_dr_receiver:
    profiles: [bot-fi]
    <<: *app
    command: [uvicorn, dr_receiver_app:app, --host, 0.0.0.0, --port, "8000", --workers, "1"]
    environment:
      <<: *bot_env
      TRADING_BOT_SERVICE: dr_receiver
      DR_SYNC_PAIRWISE_KEYS_JSON: ${BOT_FI_DR_PAIRWISE_KEYS_JSON:?required}
      DATABASE_URL: postgresql+asyncpg://bot_fi_receiver:${BOT_FI_RECEIVER_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://bot_fi_receiver:${BOT_FI_RECEIVER_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      DR_PROJECTION_DATABASE_URL: postgresql+asyncpg://bot_fi_receiver:${BOT_FI_RECEIVER_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      ORIGIN_EXPECTED_MIGRATION_REVISION: ${ORIGIN_EXPECTED_MIGRATION_REVISION:?required}
      POSTGRES_USER: bot_fi_receiver
      POSTGRES_PASSWORD: ${BOT_FI_RECEIVER_DB_PASSWORD}
    depends_on: {bot_fi_db_roles: {condition: service_completed_successfully}}
    networks: [bot_fi]
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 5s
      timeout: 4s
      retries: 20

  bot_fi_dr_projection:
    profiles: [bot-fi]
    <<: *app
    command: [python, -m, core.dr_projection_worker]
    environment:
      <<: *bot_env
      TRADING_BOT_SERVICE: dr_projection_worker
      DATABASE_URL: postgresql+asyncpg://bot_fi_projection:${BOT_FI_PROJECTION_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://bot_fi_projection:${BOT_FI_PROJECTION_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      DR_PROJECTION_DATABASE_URL: postgresql+asyncpg://bot_fi_projection:${BOT_FI_PROJECTION_DB_PASSWORD}@bot_fi_db/${BOT_FI_POSTGRES_DB}
      POSTGRES_USER: bot_fi_projection
      POSTGRES_PASSWORD: ${BOT_FI_PROJECTION_DB_PASSWORD}
    depends_on: {bot_fi_dr_receiver: {condition: service_healthy}}
    networks: [bot_fi]

  bot_fi_db_roles:
    profiles: [bot-fi]
    <<: *app
    restart: "no"
    command: [python, scripts/provision_bot_database_roles.py, --role-prefix, bot_fi]
    environment:
      <<: *bot_env
      BOT_APP_DB_PASSWORD: ${BOT_FI_APP_DB_PASSWORD:?required}
      BOT_RECEIVER_DB_PASSWORD: ${BOT_FI_RECEIVER_DB_PASSWORD:?required}
      BOT_DELIVERY_DB_PASSWORD: ${BOT_FI_DELIVERY_DB_PASSWORD:?required}
      BOT_PROJECTION_DB_PASSWORD: ${BOT_FI_PROJECTION_DB_PASSWORD:?required}
      BOT_OBSERVER_DB_PASSWORD: ${BOT_FI_OBSERVER_DB_PASSWORD:?required}
    depends_on: {bot_fi_migration: {condition: service_completed_successfully}}
    networks: [bot_fi]

  bot_fi_sync_observer:
