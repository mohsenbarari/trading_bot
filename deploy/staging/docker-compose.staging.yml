x-app-image: &app_image trading_bot_staging_app:${STAGING_IMAGE_TAG:-latest}
x-app-build: &app_build
  context: ../..
  dockerfile: Dockerfile
  args:
    FRONTEND_DIST_DIR: ${STAGING_FRONTEND_DOCKER_DIST_DIR:-mini_app_dist_staging}

services:
  app:
    image: *app_image
    build: *app_build
    restart: unless-stopped
    command: sh -c "exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${STAGING_API_WORKERS:-2}"
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: api
      ENVIRONMENT: staging
      SERVER_MODE: iran
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      API_WORKERS: ${STAGING_API_WORKERS:-2}
      DB_POOL_SIZE: ${STAGING_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    ports:
      - "127.0.0.1:${STAGING_APP_PORT:-8100}:8000"
    volumes:
      - staging_uploads:/app/uploads
      - staging_audit:/app/audit_trail
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/config', timeout=5).read(); sys.exit(0)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - staging_net

  foreign_app:
    image: *app_image
    build: *app_build
    profiles:
      - staging-bot
    restart: unless-stopped
    command: sh -c "exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${STAGING_FOREIGN_API_WORKERS:-1}"
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: api
      ENVIRONMENT: staging
      SERVER_MODE: foreign
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      FRONTEND_URL: ${STAGING_FOREIGN_FRONTEND_URL:-https://staging.gold-trade.ir}
      IRAN_SERVER_URL: ${STAGING_FOREIGN_IRAN_SERVER_URL:-https://staging.gold-trade.ir}
      FOREIGN_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      GERMANY_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      API_WORKERS: ${STAGING_FOREIGN_API_WORKERS:-1}
      DB_POOL_SIZE: ${STAGING_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    ports:
      - "127.0.0.1:${STAGING_FOREIGN_APP_PORT:-8121}:8000"
    volumes:
      - staging_uploads:/app/uploads
      - staging_audit:/app/audit_trail
    depends_on:
      migration:
        condition: service_completed_successfully
      app:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/config', timeout=5).read(); sys.exit(0)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - staging_net

  sync_worker:
    image: *app_image
    build: *app_build
    profiles:
      - staging-sync
    restart: unless-stopped
    command: python -m core.sync_worker
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: sync_worker
      ENVIRONMENT: staging
      SERVER_MODE: iran
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      DB_POOL_SIZE: ${STAGING_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    volumes:
      - staging_audit:/app/audit_trail
    depends_on:
      migration:
        condition: service_completed_successfully
      app:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - staging_net

  foreign_sync_worker:
    image: *app_image
    build: *app_build
    profiles:
      - staging-sync
    restart: unless-stopped
    command: python -m core.sync_worker
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: sync_worker
      ENVIRONMENT: staging
      SERVER_MODE: foreign
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      FRONTEND_URL: ${STAGING_FOREIGN_FRONTEND_URL:-https://staging.gold-trade.ir}
      IRAN_SERVER_URL: ${STAGING_FOREIGN_IRAN_SERVER_URL:-https://staging.gold-trade.ir}
      FOREIGN_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      GERMANY_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      DB_POOL_SIZE: ${STAGING_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    volumes:
      - staging_audit:/app/audit_trail
    depends_on:
      migration:
        condition: service_completed_successfully
      foreign_app:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - staging_net

  migration:
    image: *app_image
    build: *app_build
    command: ["python", "manage.py"]
    environment:
      TZ: UTC
      ENVIRONMENT: staging
      DB_POOL_SIZE: ${STAGING_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    depends_on:
      db:
        condition: service_healthy
    networks:
      - staging_net

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    command: postgres -c max_connections=${STAGING_POSTGRES_MAX_CONNECTIONS:-100} -c timezone=UTC -c log_timezone=UTC
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - ../../.env.staging
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - ${REDIS_APPENDONLY:-yes}
      - --appendfsync
      - ${REDIS_APPENDFSYNC:-everysec}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-0}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
    environment:
      TZ: UTC
    volumes:
      - staging_redis_data:/data
    networks:
      - staging_net

  bot:
    image: *app_image
    build: *app_build
    profiles:
      - staging-bot
    restart: unless-stopped
    command: python run_bot.py
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: bot
      ENVIRONMENT: staging
      SERVER_MODE: foreign
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      FRONTEND_URL: ${STAGING_FOREIGN_FRONTEND_URL:-https://staging.gold-trade.ir}
      IRAN_SERVER_URL: ${STAGING_FOREIGN_IRAN_SERVER_URL:-https://staging.gold-trade.ir}
      FOREIGN_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      GERMANY_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      DB_POOL_SIZE: ${STAGING_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    depends_on:
      foreign_app:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - staging_net

  load_telegram_foreign:
    image: *app_image
    build: *app_build
    profiles:
      - staging-load
    restart: "no"
    command: ["python", "scripts/trading_core_probe_worker.py", "load-runner-ready", "--role", "telegram_foreign"]
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: load_runner
      ENVIRONMENT: staging
      SERVER_MODE: foreign
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      FRONTEND_URL: ${STAGING_FOREIGN_FRONTEND_URL:-https://staging.gold-trade.ir}
      IRAN_SERVER_URL: ${STAGING_FOREIGN_IRAN_SERVER_URL:-https://staging.gold-trade.ir}
      FOREIGN_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      GERMANY_SERVER_URL: ${STAGING_FOREIGN_FOREIGN_SERVER_URL:-http://foreign_app:8000}
      BOT_TOKEN: ""
      DB_POOL_SIZE: ${STAGING_LOAD_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_LOAD_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - staging_net

  load_webapp_iran:
    image: *app_image
    build: *app_build
    profiles:
      - staging-load
    restart: "no"
    command: ["python", "scripts/trading_core_probe_worker.py", "load-runner-ready", "--role", "webapp_iran"]
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: load_runner
      ENVIRONMENT: staging
      SERVER_MODE: iran
      RELEASE_SHA: ${STAGING_RELEASE_SHA:-staging}
      BOT_TOKEN: ""
      DB_POOL_SIZE: ${STAGING_LOAD_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${STAGING_LOAD_DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    env_file:
      - ../../.env.staging
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - staging_net

networks:
  staging_net:
    driver: bridge

volumes:
  staging_postgres_data:
  staging_redis_data:
  staging_uploads:
  staging_audit:
