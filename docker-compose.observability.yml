services:
  loki:
    image: grafana/loki:3
    container_name: trading_bot_loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3
    container_name: trading_bot_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11
    container_name: trading_bot_grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-before-production}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-smtp.example.invalid:587}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-alerts@example.invalid}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Trading Bot Alerts}
      GRAFANA_ALERT_DEFAULT_RECEIVER: ${GRAFANA_ALERT_DEFAULT_RECEIVER:-Trading Bot Local Webhook}
      GRAFANA_ALERT_CRITICAL_RECEIVER: ${GRAFANA_ALERT_CRITICAL_RECEIVER:-Trading Bot Local Webhook}
      GRAFANA_ALERT_WARNING_RECEIVER: ${GRAFANA_ALERT_WARNING_RECEIVER:-Trading Bot Local Webhook}
      GRAFANA_ALERT_WEBHOOK_URL: ${GRAFANA_ALERT_WEBHOOK_URL:-http://127.0.0.1:9/trading-bot-alerts-disabled}
      GRAFANA_ALERT_EMAIL_ADDRESSES: ${GRAFANA_ALERT_EMAIL_ADDRESSES:-alerts@example.invalid}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
