x-default-logging: &default_logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  app:
    image: trading_bot_base
    logging: *default_logging
    container_name: trading_bot_app
    restart: always
    command: sh -c "exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-2}"
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: api
      TRADING_BOT_METRICS_BACKEND: ${TRADING_BOT_METRICS_BACKEND:-memory}
      AUDIT_TRAIL_PATH: ${AUDIT_TRAIL_PATH:-/app/audit_trail/audit.jsonl}
      API_WORKERS: ${API_WORKERS:-2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-15}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}

    volumes:
      - ${CERTS_HOST_PATH:-/root/cert/ip}:/app/certs  # Mount Host Certs
      - ./api:/app/api
      - ./bot:/app/bot
      - ./core:/app/core
      - ./src:/app/src
      - ./models:/app/models
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./main.py:/app/main.py
      - ./schemas.py:/app/schemas.py
      - ./mini_app_dist:/app/mini_app_dist
      - ./trading_settings.json:/app/trading_settings.json
      - uploads_data:/app/uploads
      - audit_data:/app/audit_trail
    ports:
      - "127.0.0.1:8000:8000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    extra_hosts:
      - "${IRAN_PUBLIC_DOMAIN:-coin.gold-trade.ir}:${IRAN_PUBLIC_IP:-65.109.220.59}"
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - trading_net

  bot:
    image: trading_bot_base
    logging: *default_logging
    container_name: trading_bot_bot
    restart: always
    command: python run_bot.py
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: bot
      TRADING_BOT_METRICS_BACKEND: ${TRADING_BOT_METRICS_BACKEND:-memory}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-15}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    volumes:
      - .:/app
    env_file:
      - .env
    extra_hosts:
      - "${IRAN_PUBLIC_DOMAIN:-coin.gold-trade.ir}:${IRAN_PUBLIC_IP:-65.109.220.59}"
    depends_on:
      migration:
        condition: service_completed_successfully
    networks:
      - trading_net

  sync_worker:
    image: trading_bot_base
    logging: *default_logging
    container_name: trading_bot_sync_worker
    restart: always
    command: python -m core.sync_worker
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: sync_worker
      TRADING_BOT_METRICS_BACKEND: ${TRADING_BOT_METRICS_BACKEND:-memory}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-15}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    volumes:
      - ./api:/app/api
      - ./bot:/app/bot
      - ./core:/app/core
      - ./src:/app/src
      - ./models:/app/models
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./main.py:/app/main.py
      - ./schemas.py:/app/schemas.py
      - ./trading_settings.json:/app/trading_settings.json
    env_file:
      - .env
    extra_hosts:
      - "${IRAN_PUBLIC_DOMAIN:-coin.gold-trade.ir}:${IRAN_PUBLIC_IP:-65.109.220.59}"
    depends_on:
      redis:
        condition: service_started
    networks:
      - trading_net

  migration:
    image: trading_bot_base
    logging: *default_logging
    container_name: trading_bot_migration

    command:
      - sh
      - -c
      - python manage.py && python scripts/align_trade_number_sequence.py
    environment:
      TZ: UTC
      DB_POOL_SIZE: ${DB_POOL_SIZE:-15}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trading_net

  db:
    image: postgres:15-alpine
    logging: *default_logging
    container_name: trading_bot_db
    restart: always
    command: postgres -c max_connections=500 -c timezone=UTC -c log_timezone=UTC
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - trading_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    logging: *default_logging
    container_name: trading_bot_redis
    command:
      - redis-server
      - --appendonly
      - ${REDIS_APPENDONLY:-yes}
      - --appendfsync
      - ${REDIS_APPENDFSYNC:-everysec}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-0}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
    environment:
      TZ: UTC
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - trading_net

  tileserver:
    image: maptiler/tileserver-gl:latest
    logging: *default_logging
    container_name: trading_bot_tileserver
    restart: always
    environment:
      TZ: UTC
    volumes:
      - ./map_data:/data
    ports:
      - "8088:8080"
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  audit_data:
