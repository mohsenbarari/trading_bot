x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-50m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  app:
    image: trading_bot_base
    container_name: trading_bot_app
    restart: always
    logging: *default-logging
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      TZ: UTC

    volumes:
      - ${CERTS_HOST_PATH:-/root/cert/ip}:/app/certs  # Mount Host Certs
      - ./api:/app/api
      - ./bot:/app/bot
      - ./core:/app/core
      - ./src:/app/src
      - ./models:/app/models
      - ./migrations:/app/migrations
      - ./main.py:/app/main.py
      - ./schemas.py:/app/schemas.py
      - ./mini_app_dist:/app/mini_app_dist
      - ./trading_settings.json:/app/trading_settings.json
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - trading_net

  bot:
    image: trading_bot_base
    container_name: trading_bot_bot
    restart: always
    logging: *default-logging
    command: python run_bot.py
    environment:
      TZ: UTC
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      migration:
        condition: service_completed_successfully
    networks:
      - trading_net

  sync_worker:
    image: trading_bot_base
    container_name: trading_bot_sync_worker
    profiles: ["disabled"]
    restart: always
    logging: *default-logging
    command: python -m core.sync_worker
    environment:
      TZ: UTC
    volumes:
      - ./api:/app/api
      - ./bot:/app/bot
      - ./core:/app/core
      - ./src:/app/src
      - ./models:/app/models
      - ./migrations:/app/migrations
      - ./main.py:/app/main.py
      - ./schemas.py:/app/schemas.py
      - ./trading_settings.json:/app/trading_settings.json
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    networks:
      - trading_net

  migration:
    image: trading_bot_base
    container_name: trading_bot_migration
    logging: *default-logging

    command: [ "python", "manage.py" ]
    environment:
      TZ: UTC
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trading_net

  db:
    image: postgres:15-alpine
    container_name: trading_bot_db
    restart: always
    logging: *default-logging
    command: postgres -c max_connections=500 -c timezone=UTC -c log_timezone=UTC
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - trading_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading_bot_redis
    logging: *default-logging
    environment:
      TZ: UTC
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - trading_net

  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: trading_bot_tileserver
    restart: always
    logging: *default-logging
    environment:
      TZ: UTC
    volumes:
      - ./map_data:/data
    ports:
      - "8088:8080"
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
