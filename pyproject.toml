[tool.mutmut]
source_paths = ["core", "api", "bot", "models"]
also_copy = ["schemas.py", "main.py", "deploy"]
only_mutate = [
  "core/registration_identity.py",
  "core/services/authoritative_registration_service.py",
  "core/services/canonical_invitation_creation_service.py",
  "core/services/telegram_registration_intent_service.py",
  "core/services/otp_delivery_state_service.py",
  "core/services/registration_command_receipt_service.py",
  "core/registration_sync_policy.py",
  "core/background_job_authority.py",
  "core/invitation_sms_policy.py",
]
pytest_add_cli_args_test_selection = [
  "tests/test_stage9_mutation_contracts.py",
  "tests/test_authoritative_registration_service.py::AuthoritativeRegistrationServiceTests::test_telegram_post_expiry_boundary_is_inclusive_then_terminal",
  "tests/test_stage9_service_boundaries.py::Stage9RegistrationIntentBoundaryTests::test_projection_rejection_and_success_matrix",
  "tests/test_stage6_otp_delivery.py::Stage6RequestAndCompatibilityTests::test_stage6_sms_claim_paths_are_explicit_and_audited",
  "tests/test_background_job_authority.py",
  "tests/test_registration_sync_policy.py::RegistrationSyncPolicyTests::test_iran_user_patch_keeps_identity_and_drops_foreign_or_unknown_fields",
  "tests/test_registration_sync_policy.py::RegistrationSyncPolicyTests::test_foreign_user_patch_keeps_only_monotonic_onboarding_and_last_seen",
  "tests/test_stage3_invitation_creation.py::Stage3CanonicalInvitationTests::test_sms_flags_are_independent_and_status_is_explicit",
]
pytest_add_cli_args = ["--import-mode=prepend", "--override-ini=pythonpath=."]
mutate_only_covered_lines = false
