server {
    listen 80;
    listen 443 ssl;
    server_name coin.362514.ir mini-app.362514.ir;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/coin.362514.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coin.362514.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/trading-bot/trading_bot/mini_app_dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/trading_bot_access.log;
    error_log /var/log/nginx/trading_bot_error.log warn;

    # 1. API Reverse Proxy
    location ~ ^/api/invitations/(lookup|validate)/ {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Force CORS headers on all responses, including errors (4xx/5xx)
        # Using 'always' ensures headers are sent even on error pages
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 2. Frontend Routing (SPA)
    location ~ ^/register(?:/|$) {
        access_log off;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location ^~ /i/ {
        access_log off;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Static-Delivery "nginx" always;
    }

    # 3. Assets
    location ~ ^/assets/.*\.js$ {
        try_files $uri @stale_js_chunk;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location = /share-target-sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header X-Static-Delivery "nginx" always;
    }

    location ~ ^/workbox-[A-Za-z0-9_-]+\.js$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Static-Delivery "nginx" always;
    }

    # 4. Uploads
    location /uploads/ {
        access_log off;
        return 404;
    }

    location @stale_js_chunk {
        internal;
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Static-Delivery "nginx" always;
        return 200 "console.warn('Stale PWA chunk requested. Forcing hard reload...'); window.location.reload(true);";
    }
}

server {
    listen 80;
    server_name coin.362514.ir mini-app.362514.ir;
    access_log off;
    return 301 https://$host$request_uri;
}
