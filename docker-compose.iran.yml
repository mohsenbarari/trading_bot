# ==========================================
# Docker Compose - Iran Server
# بدون Telegram Bot
# ==========================================

x-default-logging: &default_logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  app:
    image: trading_bot_base_iran
    logging: *default_logging
    container_name: trading_bot_app
    restart: always
    command: sh -c "exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-4}"
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: api
      TRADING_BOT_METRICS_BACKEND: ${TRADING_BOT_METRICS_BACKEND:-memory}
      AUDIT_TRAIL_PATH: ${AUDIT_TRAIL_PATH:-/app/audit_trail/audit.jsonl}
      API_WORKERS: ${API_WORKERS:-4}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-8}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
      BACKGROUND_JOBS_ENABLED: ${BACKGROUND_JOBS_ENABLED:-true}
    volumes:
      - ./api:/app/api
      - ./bot:/app/bot
      - ./core:/app/core
      - ./src:/app/src
      - ./models:/app/models
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./main.py:/app/main.py
      - ./schemas.py:/app/schemas.py
      - ./mini_app_dist:/app/mini_app_dist
      - ./trading_settings.json:/app/trading_settings.json
      - uploads_data:/app/uploads
      - audit_data:/app/audit_trail
    ports:
      - "127.0.0.1:8000:8000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/config', timeout=5).read(); sys.exit(0)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - trading_net

  # ❌ Bot Service - غیرفعال در سرور ایران
  # bot:
  #   container_name: trading_bot_bot
  #   restart: always
  #   command: python run_bot.py
  #   ...

  sync_worker:
    image: trading_bot_base_iran
    logging: *default_logging
    container_name: trading_bot_sync_worker
    restart: always
    command: python -m core.sync_worker
    environment:
      TZ: UTC
      TRADING_BOT_SERVICE: sync_worker
      TRADING_BOT_METRICS_BACKEND: ${TRADING_BOT_METRICS_BACKEND:-memory}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-8}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    volumes:
      - ./api:/app/api
      - ./bot:/app/bot
      - ./core:/app/core
      - ./src:/app/src
      - ./models:/app/models
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./main.py:/app/main.py
      - ./schemas.py:/app/schemas.py
      - ./trading_settings.json:/app/trading_settings.json
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    networks:
      - trading_net

  migration:
    image: trading_bot_base_iran
    logging: *default_logging
    container_name: trading_bot_migration
    command: [ "python", "manage.py" ]
    environment:
      TZ: UTC
      DB_POOL_SIZE: ${DB_POOL_SIZE:-8}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trading_net

  db:
    image: postgres:15-alpine
    logging: *default_logging
    container_name: trading_bot_db
    restart: always
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-150}
      - -c
      - timezone=UTC
      - -c
      - log_timezone=UTC
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-2GB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-5GB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
      - -c
      - random_page_cost=${POSTGRES_RANDOM_PAGE_COST:-1.2}
      - -c
      - effective_io_concurrency=${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-200}
      - -c
      - checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-15min}
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-2GB}
      - -c
      - min_wal_size=${POSTGRES_MIN_WAL_SIZE:-512MB}
      - -c
      - wal_buffers=${POSTGRES_WAL_BUFFERS:-16MB}
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - trading_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    logging: *default_logging
    container_name: trading_bot_redis
    command:
      - redis-server
      - --appendonly
      - ${REDIS_APPENDONLY:-yes}
      - --appendfsync
      - ${REDIS_APPENDFSYNC:-everysec}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-0}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
    environment:
      TZ: UTC
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  audit_data:
